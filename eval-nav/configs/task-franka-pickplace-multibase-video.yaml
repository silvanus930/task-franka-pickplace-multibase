# Quick eval with video recording (1 env, 1 episode).
# Requires headless Vulkan — run install_isaac_headless_libs.sh on Lium pods first.
#
# Usage (from eval-nav/):
#   NEPHER_EVAL_IN_PROCESS=1 python scripts/evaluate.py \
#     --config configs/task-franka-pickplace-multibase-video.yaml \
#     --headless \
#     --checkpoint ../task-franka-pickplace-multibase/best_policy/best_policy.pt
#
# Video output: logs/franka-pickplace-multibase-hl-video/eval_run_*/videos/eval/

task_name: "Nepher-Franka-PickPlace-HL-Multibase-EnvhubSafePlay-v0"
task_module: "franka_pickplace_multibase"
category: "manipulation"

env_scenes:
  - env_id: "franka-pickplace-multibase-sample"
    scene: 0

seeds:
  - 42

num_episodes: 1
max_episode_steps: 1500
max_episode_time_s: 30.0

num_envs: 1

task_type: "manipulation.pick_place"
scoring_version: "v2"

log_dir: "logs/franka-pickplace-multibase-hl-video"
enable_logging: false
enable_cameras: true
video: true
video_length: 1500

timeout_seconds: null
policy_path: "default"
