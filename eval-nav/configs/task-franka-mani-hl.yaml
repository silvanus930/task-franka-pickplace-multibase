# Evaluation configuration for task-franka-mani-hl
#
# Evaluates the Franka HL classical pick-and-place policy on the
# franka-pickplace-base-sample envhub preset.  The frozen LL RSL-RL checkpoint
# drives the arm; the PickPlacePlanner drives the HL logic.
#
# Uses manipulation.pick_place / v2 scoring: success_rate × (0.75 + 0.25 × time_efficiency).
# Success rate is a first-class multiplier — higher SR always yields a higher score.
# No locomotion telemetry is required.

task_name: "Nepher-Franka-Mani-HL-Envhub-Play-v0"
task_module: "franka_mani_base"
category: "manipulation"

env_scenes:
  - env_id: "franka-pickplace-base-v1"
    scene: 0

seeds:
  - 42

num_episodes: 5
max_episode_steps: 900

# Physical time budget — matches the preset's max_episode_length_s.
max_episode_time_s: 20.0

num_envs: 300

# Scorer: manipulation pick-and-place, version 2
# manipulation.pick_place supports: v1 (deprecated), v2
task_type: "manipulation.pick_place"
scoring_version: "v2"

log_dir: "logs/franka-mani-hl"
enable_logging: true
enable_cameras: false
timeout_seconds: null
policy_path: "default"
